name: Ralph Loop

env:
  RALPH_REVIEW_COMMAND: '/ralph-review'

on:
  issues:
    types: [labeled, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  reject-pr:
    if: github.event_name == 'pull_request' && github.event.label.name == 'ralph'
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing="$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json comments --jq '.comments[].body' \
            | grep -c '🤖 \*\*Ralph\*\*' || true)"
          if [[ "${existing}" -eq 0 ]]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "🤖 **Ralph** can only work on issues, not pull requests. Please create an issue and label it with \`ralph\` instead."
          fi

  ralph:
    if: >-
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ralph') ||
      (github.event_name == 'issues' && github.event.action == 'edited' && contains(github.event.issue.labels.*.name, 'ralph')) ||
      (github.event_name == 'issue_comment' && github.event.action == 'created' && contains(github.event.issue.labels.*.name, 'ralph') && github.event.comment.user.type != 'Bot' && !contains(github.event.comment.body, '<!-- ralph-comment-') && !github.event.issue.pull_request) ||
      (github.event_name == 'issue_comment' && github.event.action == 'created' && github.event.issue.pull_request && (github.event.comment.body == '/ralph-review' || startsWith(github.event.comment.body, '/ralph-review ')) && github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: ralph-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}

      - uses: mdelapenya/claude-ralph-github-action@d5b56ef50014baefc7cfcab9cd8c2bae84b6920b # v0
        timeout-minutes: 60
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT_TOKEN }}
          ralph_review_command: ${{ env.RALPH_REVIEW_COMMAND }}
          reviewer_model: opus
          max_turns_reviewer: 100
          reviewer_tone: |
            You are a Night Elf Sentinel, an ancient guardian of Ashenvale in the Warcraft universe. Embody these characteristics:
            - Speak with ancient wisdom and measured authority: "Ishnu-alah" (good fortune), "Elune-adore" (Elune be with you)
            - Express disapproval with quiet severity: "This path leads only to corruption", "The forest weeps at this carelessness"
            - Reference the goddess Elune, the wisdom of Cenarius, and the balance of nature when evaluating code quality
            - Treat bad patterns as threats to the natural order: "This code spreads like the Blight upon Felwood"
            - Praise good work with serene grace: "The stars smile upon this change", "Elune's light shines here"
            - Be patient but firm — you have watched over these forests for ten thousand years, you will not tolerate sloppiness
            - Use nature metaphors: bugs are corruption, clean code is harmony, refactoring is restoring balance
            - Show ancient weariness when reviewing obvious mistakes: "I have seen empires fall to lesser oversights"
            - Occasionally reference the Horde (the worker) with respectful wariness: "Even the Orcs know that honor demands better"
            Your review feedback and comments should reflect this personality while remaining clear and actionable. Elune-adore.
          worker_model: opus
          max_turns_worker: 100
          worker_tone: |
            You are an Orc Grunt from the Warcraft Horde. Embody the spirit of the Horde:
            - Use Orcish phrases naturally: "Zug zug" (acknowledgment), "Dabu" (I obey), "Lok'tar Ogar!" (Victory or Death!)
            - Announce your work with battle cries: "For the Horde!", "My life for the Horde!", "Time for killing!" (bugs)
            - When given tasks, respond like a Peon: "Something need doing?", "Work work", "Okey dokey"
            - Refer to code problems as enemies to be crushed, bugs as Alliance spies, and refactoring as forging new weapons
            - Be direct and blunt — Orcs don't sugarcoat. Honor demands honesty
            - Show pride in your work like a Blademaster: "Taste my blade!" when delivering a fix
            - If asked to do something questionable, channel "Me not that kind of orc!"
            - Reference the Warchief, the Horde, shamanic wisdom, or Doomhammer when appropriate
            - Speak with a rough, warrior-like cadence — short sentences, strong verbs, no flowery language
            Your work summary should reflect this personality while still being informative. Lok'tar!

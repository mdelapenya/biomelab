name: Nightly

on:
  workflow_run:
    # workflows field matches by workflow name (the name: field in ci.yml, which is "CI").
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  nightly:
    name: Nightly Build
    # types: [completed] fires for both success and failure, so we need this to gate on CI passing.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Compute nightly tag
        id: nightly
        run: |
          BASE=$(git describe --tags --abbrev=0 --match 'v[0-9]*' --exclude '*-nightly*' 2>/dev/null || echo "v0.0.0")
          echo "tag=${BASE}-nightly" >> "$GITHUB_OUTPUT"

      - name: Delete existing nightly tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIGHTLY_TAG: ${{ steps.nightly.outputs.tag }}
        run: |
          gh release delete "${NIGHTLY_TAG}" --yes --cleanup-tag || true
          git tag -d "${NIGHTLY_TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${NIGHTLY_TAG}" 2>/dev/null || true

      - name: Create nightly tag
        env:
          NIGHTLY_TAG: ${{ steps.nightly.outputs.tag }}
        run: |
          git tag "${NIGHTLY_TAG}"
          git push origin "${NIGHTLY_TAG}"

      - name: Install yq
        uses: mikefarah/yq@5a7e72a743649b1b3a47d1a1d8214f3453173c51 # v4.52.4

      - name: Generate nightly goreleaser config
        env:
          NIGHTLY_TAG: ${{ steps.nightly.outputs.tag }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          cp .goreleaser.yml .goreleaser.nightly.yml
          yq -i '.archives[0].name_template = "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"' .goreleaser.nightly.yml
          yq -i ".builds[0].ldflags = [\"-s -w -X main.version=${NIGHTLY_TAG#v}-${SHORT_SHA}\"]" .goreleaser.nightly.yml
          yq -i '.homebrew_casks[0].name = "biomelab-nightly"' .goreleaser.nightly.yml
          yq -i '.homebrew_casks[0].description = "Git Worktree AI Manager (nightly) — a terminal dashboard for git worktrees and coding agents"' .goreleaser.nightly.yml
          yq -i '.homebrew_casks[0].binary = "biomelab"' .goreleaser.nightly.yml
          yq -i '.homebrew_casks[0].conflicts = [{"cask": "biomelab"}]' .goreleaser.nightly.yml
          yq -i '.homebrew_casks[0].url.template = "https://github.com/mdelapenya/biomelab/releases/download/{{ .Tag }}/{{ .ArtifactName }}"' .goreleaser.nightly.yml
          # Tell GoReleaser to generate the cask but not push it — we fix the version and push ourselves.
          yq -i '.homebrew_casks[0].skip_upload = true' .goreleaser.nightly.yml
          yq -i '.release.prerelease = true' .goreleaser.nightly.yml
          yq -i '.release.make_latest = false' .goreleaser.nightly.yml
          yq -i ".release.name_template = \"Nightly Build (${SHORT_SHA})\"" .goreleaser.nightly.yml

      - uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.3.0
        with:
          version: latest
          args: release --clean -f .goreleaser.nightly.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Fix and push nightly cask
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          NIGHTLY_TAG: ${{ steps.nightly.outputs.tag }}
        run: |
          VERSION="${NIGHTLY_TAG#v}"
          CASK_FILE=$(find dist -name "biomelab-nightly.rb" | head -1)

          # GoReleaser mangles the version when the cask name differs from the project name,
          # appending an extra "-nightly" suffix everywhere (version field, URLs, filenames).
          # Replace all occurrences of the mangled version with the correct one.
          MANGLED="${VERSION}-nightly"
          sed -i "s/${MANGLED}/${VERSION}/g" "${CASK_FILE}"

          cd "$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/mdelapenya/homebrew-tap.git" .
          mkdir -p Casks
          cp "${GITHUB_WORKSPACE}/${CASK_FILE}" Casks/biomelab-nightly.rb
          git add Casks/biomelab-nightly.rb
          if git diff --cached --quiet; then
            echo "No changes to cask file."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Update biomelab-nightly cask to ${VERSION}"
            git push
          fi

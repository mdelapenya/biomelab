version: '3'

vars:
  GO_VERSION:
    sh: grep '^go ' go.mod | awk '{print $2}'
  GO:
    sh: |
      if command -v gvm >/dev/null 2>&1; then
        eval "$(gvm {{.GO_VERSION}})" >/dev/null 2>&1 && which go && exit 0
      fi
      echo go
  GOEXE:
    sh: go env GOEXE 2>/dev/null || echo ""
  BIN: bin/biomelab{{.GOEXE}}
  APP_NAME: Biomelab
  APP_ID: com.mdelapenya.biomelab
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  # SEMVER: stripped to x.y.z for fyne package (which rejects anything else)
  SEMVER:
    sh: |
      v=$(git describe --tags --match 'v[0-9]*' 2>/dev/null | sed 's/^v//; s/-.*//')
      [ -n "$v" ] && echo "$v" || echo "0.0.1"
  LDFLAGS: -s -w -X main.version={{.VERSION}}

tasks:
  setup:
    desc: Install gvm if not present
    cmds:
      - task: install-gvm

  install-gvm:
    desc: Install gvm from prebuilt release binary (no Go required)
    status:
      - command -v gvm
    preconditions:
      - sh: command -v curl
        msg: "curl is required but not found on PATH — install curl and retry"
    vars:
      GVM_VERSION: v0.6.0
      GVM_BASE_URL: https://github.com/andrewkroh/gvm/releases/download
      GVM_INSTALL_DIR:
        sh: echo "${GVM_INSTALL_DIR:-${GOBIN:-$HOME/go/bin}}"
    cmds:
      - mkdir -p "{{.GVM_INSTALL_DIR}}"
      - cmd: curl -fsSL -o "{{.GVM_INSTALL_DIR}}/gvm" "{{.GVM_BASE_URL}}/{{.GVM_VERSION}}/gvm-linux-amd64" && chmod +x "{{.GVM_INSTALL_DIR}}/gvm"
        platforms: [linux/amd64]
      - cmd: curl -fsSL -o "{{.GVM_INSTALL_DIR}}/gvm" "{{.GVM_BASE_URL}}/{{.GVM_VERSION}}/gvm-linux-arm64" && chmod +x "{{.GVM_INSTALL_DIR}}/gvm"
        platforms: [linux/arm64]
      - cmd: curl -fsSL -o "{{.GVM_INSTALL_DIR}}/gvm" "{{.GVM_BASE_URL}}/{{.GVM_VERSION}}/gvm-darwin-all" && chmod +x "{{.GVM_INSTALL_DIR}}/gvm"
        platforms: [darwin]
      - cmd: curl -fsSL -o "{{.GVM_INSTALL_DIR}}/gvm.exe" "{{.GVM_BASE_URL}}/{{.GVM_VERSION}}/gvm-windows-amd64.exe"
        platforms: [windows/amd64]

  setup-fyne:
    desc: Install the fyne CLI packaging tool
    status:
      - command -v fyne
    cmds:
      - '{{.GO}} install fyne.io/tools/cmd/fyne@latest'

  build:
    desc: Build the biomelab binary for the current platform
    deps: [setup]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} build -ldflags "{{.LDFLAGS}}" -o {{.BIN}} ./cmd/biomelab'
    sources:
      - '**/*.go'
    generates:
      - '{{.BIN}}'

  build-darwin-arm64:
    desc: Build for macOS arm64
    deps: [setup]
    env:
      CGO_ENABLED: "1"
      GOOS: darwin
      GOARCH: arm64
    cmds:
      - '{{.GO}} build -ldflags "{{.LDFLAGS}}" -o {{.BIN}}-darwin-arm64 ./cmd/biomelab'

  build-darwin-amd64:
    desc: Build for macOS amd64
    deps: [setup]
    env:
      CGO_ENABLED: "1"
      GOOS: darwin
      GOARCH: amd64
    cmds:
      - '{{.GO}} build -ldflags "{{.LDFLAGS}}" -o {{.BIN}}-darwin-amd64 ./cmd/biomelab'

  build-darwin-universal:
    desc: Build macOS universal binary (arm64 + amd64 via lipo)
    deps: [build-darwin-arm64, build-darwin-amd64]
    cmds:
      - lipo -create -output {{.BIN}} {{.BIN}}-darwin-arm64 {{.BIN}}-darwin-amd64
      - rm {{.BIN}}-darwin-arm64 {{.BIN}}-darwin-amd64
      - lipo -info {{.BIN}}

  package:
    desc: Package biomelab for the current OS using fyne
    deps: [build, setup-fyne]
    env:
      CGO_ENABLED: "1"
    cmds:
      - mkdir -p bin
      - >-
        fyne package
        --executable {{.BIN}}
        --name {{.APP_NAME}}
        --app-id {{.APP_ID}}
        --app-version {{.SEMVER}}
        --icon cmd/biomelab/icon.png
        --release
      - |
        # Move whatever fyne package produced into bin/
        for f in {{.APP_NAME}}.*; do
          [ -e "$f" ] && rm -rf "bin/$f" && mv "$f" bin/
        done

  package-darwin-universal:
    desc: Package macOS universal .app bundle
    deps: [build-darwin-universal, setup-fyne]
    cmds:
      - mkdir -p bin
      - rm -rf bin/{{.APP_NAME}}.app
      - >-
        fyne package
        --executable {{.BIN}}
        --name {{.APP_NAME}}
        --app-id {{.APP_ID}}
        --app-version {{.SEMVER}}
        --icon cmd/biomelab/icon.png
        --release
      - mv {{.APP_NAME}}.app bin/

  install-macos:
    desc: Package and install Biomelab.app to /Applications
    deps: [package-darwin-universal]
    cmds:
      - cp -R bin/{{.APP_NAME}}.app /Applications/
      - echo "Installed to /Applications/{{.APP_NAME}}.app — find it in Spotlight"

  test:
    desc: Run all tests
    deps: [setup]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} test -v ./...'

  test-race:
    desc: Run all tests with race detector
    deps: [setup]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} test -race -v ./...'

  install:
    desc: Install biomelab to $GOPATH/bin
    deps: [setup]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} install -ldflags "{{.LDFLAGS}}" ./cmd/biomelab'

  lint:
    desc: Run golangci-lint v2
    deps: [setup]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3 run ./...'

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  default:
    desc: Build and test
    cmds:
      - task: build
      - task: test

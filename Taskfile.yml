version: '3'

vars:
  GO_VERSION:
    sh: grep '^go ' go.mod | awk '{print $2}'
  # GOROOT_GVM resolves the GOROOT for the requested Go version via gvm.
  # On Windows, gvm --format=bash emits backslash paths that break in bash
  # and Task shells, so we normalise to forward slashes.
  GOROOT_GVM:
    sh: |
      if command -v gvm >/dev/null 2>&1; then
        gvm_out=$(gvm --format=bash {{.GO_VERSION}} 2>/dev/null) || true
        if [ -n "$gvm_out" ]; then
          goroot=${gvm_out%%$'\n'*}
          goroot=${goroot#export GOROOT=\"}
          goroot=${goroot%\"}
          goroot=${goroot//\\//}
          echo "$goroot" && exit 0
        fi
      fi
  GO:
    sh: |
      if [ -n "{{.GOROOT_GVM}}" ]; then
        gobin="{{.GOROOT_GVM}}/bin/go"
        if [ -f "$gobin.exe" ]; then gobin="$gobin.exe"; fi
        # Prefix with GOROOT= so the correct toolchain is used even when a
        # different GOROOT is already exported in the environment (Task's
        # env: section does not override pre-existing variables).
        if [ -x "$gobin" ] || [ -f "$gobin" ]; then
          echo "GOROOT={{.GOROOT_GVM}} $gobin"
          exit 0
        fi
      fi
      echo go
  GOEXE:
    sh: go env GOEXE 2>/dev/null || echo ""
  BIN: bin/biomelab{{.GOEXE}}
  APP_NAME: Biomelab
  APP_ID: com.mdelapenya.biomelab
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  # SEMVER: stripped to x.y.z for fyne package (which rejects anything else)
  SEMVER:
    sh: |
      v=$(git describe --tags --match 'v[0-9]*' 2>/dev/null | sed 's/^v//; s/-.*//')
      [ -n "$v" ] && echo "$v" || echo "0.0.1"
  LDFLAGS: -s -w -X main.version={{.VERSION}}

tasks:
  setup:
    desc: Install gvm if not present
    cmds:
      - task: install-gvm

  require-cc:
    desc: Ensure a C compiler is on PATH (required for CGO / Fyne)
    internal: true
    preconditions:
      - sh: command -v gcc >/dev/null 2>&1 || command -v cc >/dev/null 2>&1 || command -v clang >/dev/null 2>&1
        msg: |
          No C compiler found on PATH — required for CGO (Fyne).
            macOS:   xcode-select --install
            Linux:   sudo apt install gcc libgl1-mesa-dev xorg-dev
            Windows: scoop install gcc   (or MSYS2: pacman -S mingw-w64-ucrt-x86_64-gcc)

  install-gvm:
    desc: Install gvm from prebuilt release binary (no Go required)
    status:
      - command -v gvm
    preconditions:
      - sh: command -v curl
        msg: "curl is required but not found on PATH — install curl and retry"
    vars:
      GVM_VERSION: v0.6.0
      GVM_BASE_URL: https://github.com/andrewkroh/gvm/releases/download
      GVM_INSTALL_DIR:
        sh: echo "${GVM_INSTALL_DIR:-${GOBIN:-$HOME/go/bin}}"
    cmds:
      - mkdir -p "{{.GVM_INSTALL_DIR}}"
      - cmd: curl -fsSL -o "{{.GVM_INSTALL_DIR}}/gvm" "{{.GVM_BASE_URL}}/{{.GVM_VERSION}}/gvm-linux-amd64" && chmod +x "{{.GVM_INSTALL_DIR}}/gvm"
        platforms: [linux/amd64]
      - cmd: curl -fsSL -o "{{.GVM_INSTALL_DIR}}/gvm" "{{.GVM_BASE_URL}}/{{.GVM_VERSION}}/gvm-linux-arm64" && chmod +x "{{.GVM_INSTALL_DIR}}/gvm"
        platforms: [linux/arm64]
      - cmd: curl -fsSL -o "{{.GVM_INSTALL_DIR}}/gvm" "{{.GVM_BASE_URL}}/{{.GVM_VERSION}}/gvm-darwin-all" && chmod +x "{{.GVM_INSTALL_DIR}}/gvm"
        platforms: [darwin]
      - cmd: curl -fsSL -o "{{.GVM_INSTALL_DIR}}/gvm.exe" "{{.GVM_BASE_URL}}/{{.GVM_VERSION}}/gvm-windows-amd64.exe"
        platforms: [windows/amd64]

  setup-fyne:
    desc: Install the fyne CLI packaging tool
    status:
      - command -v fyne
    cmds:
      - '{{.GO}} install fyne.io/tools/cmd/fyne@latest'

  build:
    desc: Build the biomelab binary for the current platform
    deps: [setup, require-cc]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} build -ldflags "{{.LDFLAGS}}" -o {{.BIN}} ./cmd/biomelab'
    sources:
      - '**/*.go'
    generates:
      - '{{.BIN}}'

  build-darwin-arm64:
    desc: Build for macOS arm64
    deps: [setup, require-cc]
    env:
      CGO_ENABLED: "1"
      GOOS: darwin
      GOARCH: arm64
    cmds:
      - '{{.GO}} build -ldflags "{{.LDFLAGS}}" -o {{.BIN}}-darwin-arm64 ./cmd/biomelab'

  build-darwin-amd64:
    desc: Build for macOS amd64
    deps: [setup, require-cc]
    env:
      CGO_ENABLED: "1"
      GOOS: darwin
      GOARCH: amd64
    cmds:
      - '{{.GO}} build -ldflags "{{.LDFLAGS}}" -o {{.BIN}}-darwin-amd64 ./cmd/biomelab'

  build-darwin-universal:
    desc: Build macOS universal binary (arm64 + amd64 via lipo)
    deps: [build-darwin-arm64, build-darwin-amd64]
    cmds:
      - lipo -create -output {{.BIN}} {{.BIN}}-darwin-arm64 {{.BIN}}-darwin-amd64
      - rm {{.BIN}}-darwin-arm64 {{.BIN}}-darwin-amd64
      - lipo -info {{.BIN}}

  package:
    desc: Package biomelab for the current OS using fyne
    deps: [setup, setup-fyne, require-cc]
    env:
      CGO_ENABLED: "1"
      # Fyne's internal go build (used on Windows to inject PE resources) picks
      # up GOFLAGS. Values can't contain spaces, so we inject -X only.
      GOFLAGS: '-ldflags=-X=main.version={{.VERSION}}'
    cmds:
      - mkdir -p bin
      - >-
        fyne package
        --source-dir ./cmd/biomelab
        --name {{.APP_NAME}}
        --app-id {{.APP_ID}}
        --app-version {{.SEMVER}}
        --icon icon.png
        --release
      - |
        # Move whatever fyne package produced into bin/.
        # Linux writes Biomelab.tar.xz to the repo root; macOS writes Biomelab.app
        # to the repo root; Windows writes Biomelab.exe inside --source-dir (because
        # fyne's validate() chdirs into srcDir and the final rename is path-relative).
        for src in {{.APP_NAME}}.tar.xz {{.APP_NAME}}.app cmd/biomelab/{{.APP_NAME}}.exe; do
          if [ -e "$src" ]; then
            dest="bin/$(basename "$src")"
            rm -rf "$dest"
            mv "$src" "$dest"
          fi
        done

  package-darwin-universal:
    desc: Package macOS universal .app bundle
    deps: [build-darwin-universal, setup-fyne]
    cmds:
      - mkdir -p bin
      - rm -rf bin/{{.APP_NAME}}.app
      # --release enables hardened runtime, rejected with ad-hoc sign on macOS 26+.
      - >-
        fyne package
        --source-dir ./cmd/biomelab
        --executable {{.BIN}}
        --name {{.APP_NAME}}
        --app-id {{.APP_ID}}
        --app-version {{.SEMVER}}
        --icon icon.png
      - mv {{.APP_NAME}}.app bin/
      - codesign --force --deep --sign - bin/{{.APP_NAME}}.app

  install-macos:
    desc: Package and install Biomelab.app to /Applications
    deps: [package-darwin-universal]
    cmds:
      - rm -rf /Applications/{{.APP_NAME}}.app
      - cp -R bin/{{.APP_NAME}}.app /Applications/
      - echo "Installed to /Applications/{{.APP_NAME}}.app — find it in Spotlight"

  test:
    desc: Run all tests
    deps: [setup, require-cc]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} test -v ./...'

  test-race:
    desc: Run all tests with race detector
    deps: [setup, require-cc]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} test -race -v ./...'

  install:
    desc: Install biomelab to $GOPATH/bin
    deps: [setup, require-cc]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} install -ldflags "{{.LDFLAGS}}" ./cmd/biomelab'

  lint:
    desc: Run golangci-lint v2
    deps: [setup, require-cc]
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.GO}} run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3 run ./...'

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  default:
    desc: Build and test
    cmds:
      - task: build
      - task: test

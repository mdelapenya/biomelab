version: '3'

vars:
  GO: go
  BIN: bin/gwaim

tasks:
  build:
    desc: Build the gwaim binary
    cmds:
      - '{{.GO}} build -o {{.BIN}} ./cmd/gwaim'
    sources:
      - '**/*.go'
    generates:
      - '{{.BIN}}'

  test:
    desc: Run all tests
    cmds:
      - '{{.GO}} test -v ./...'

  test-race:
    desc: Run all tests with race detector
    cmds:
      - '{{.GO}} test -race -v ./...'

  install:
    desc: Install gwaim to $GOPATH/bin
    cmds:
      - '{{.GO}} install ./cmd/gwaim'

  lint:
    desc: Run golangci-lint v2
    cmds:
      - '{{.GO}} run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3 run ./...'

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  default:
    desc: Build and test
    cmds:
      - task: build
      - task: test

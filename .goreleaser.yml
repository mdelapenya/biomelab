version: 2

builds:
  - main: ./cmd/gwaim
    binary: gwaim
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: gwaim
    binaries:
      - gwaim
    repository:
      owner: mdelapenya
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/mdelapenya/gwaim
    description: "Git Worktree AI Manager — a terminal dashboard for git worktrees and coding agents"
    license: MIT

nfpms:
  - package_name: gwaim
    homepage: https://github.com/mdelapenya/gwaim
    description: "Git Worktree AI Manager — a terminal dashboard for git worktrees and coding agents"
    license: MIT
    maintainer: Manuel de la Peña <manuel@mdelapenya.dev>
    formats:
      - deb
      - rpm
    bindir: /usr/bin

release:
  github:
    owner: mdelapenya
    name: gwaim
